<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>購入履歴グラフ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family: Arial, sans-serif; margin:0; padding:30px; background:#f5f5f5;}
body.dark-mode{background:#1e1e1e; color:#f5f5f5;}
header{display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
body.dark-mode header{background:#2b2b2b;}
a{color:#3498db; text-decoration:none;}
canvas{background:white; border-radius:8px; padding:10px;}
body.dark-mode canvas{background:#2b2b2b;}
</style>
</head>
<body>

<header>
  <h2>購入履歴グラフ</h2>
  <a href="index.html">ホームに戻る</a>
</header>

<canvas id="purchaseChart" width="800" height="400"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// Firebase設定（index.htmlと同じ）
const firebaseConfig = {apiKey:"AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",authDomain:"figure-manager-ee77e.firebaseapp.com",projectId:"figure-manager-ee77e",storageBucket:"figure-manager-ee77e.firebasestorage.app",messagingSenderId:"869184722518",appId:"1:869184722518:web:3c3c5cc645734707ec8df7"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async user=>{
  if(!user){ alert("ログインしてください"); window.location.href="index.html"; return; }
  const querySnapshot = await getDocs(collection(db,"figures"));
  const figures=[];
  querySnapshot.forEach(docSnap=>{
    const data=docSnap.data();
    if(data.uid===user.uid && data.purchaseDate) figures.push(data);
  });

  // 月別集計
  const monthlyCount=Array(12).fill(0);
  const monthlySum=Array(12).fill(0);
  figures.forEach(f=>{
    const month=parseInt(f.purchaseDate.substring(5,7))-1;
    monthlyCount[month]++;
    monthlySum[month]+=f.price;
  });

  const ctx=document.getElementById("purchaseChart").getContext("2d");
  const chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
      datasets:[
        {
          label:'購入数',
          data:monthlyCount,
          backgroundColor:'rgba(52,152,219,0.6)',
          yAxisID:'yCount'
        },
        {
          label:'購入金額(円)',
          data:monthlySum,
          backgroundColor:'rgba(231,76,60,0.6)',
          yAxisID:'yPrice'
        }
      ]
    },
    options:{
      responsive:true,
      scales:{
        yCount:{type:'linear', position:'left', beginAtZero:true, title:{display:true,text:'購入数'}},
        yPrice:{type:'linear', position:'right', beginAtZero:true, title:{display:true,text:'合計金額(円)'}}
      }
    }
  });
});
</script>
</body>
</html>
