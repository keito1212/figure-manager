<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フィギュア詳細</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input{
  width:100%;
  padding:8px 10px;
  margin:5px 0;
  border-radius:5px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

img#currentImage{
  display:block;
  max-width:100%;
  margin:10px 0;
  border-radius:5px;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-right:10px;
}

#updateBtn{
  background:#3498db;
  color:white;
}

#deleteBtn{
  background:#e74c3c;
  color:white;
}

#backBtn{
  background:#ccc;
}
</style>
</head>
<body>

<div class="container">
  <h2>商品詳細</h2>
  
  <label>商品名</label>
  <input id="name" placeholder="商品名">

  <label>価格</label>
  <input id="price" type="number" step="100" placeholder="価格">

  <label>画像URL</label>
  <input id="imageUrl" placeholder="画像URL（任意）">

  <label>現在の画像</label>
  <img id="currentImage" src="" alt="現在の画像">

  <div style="margin-top:20px;">
    <button id="updateBtn">更新</button>
    <button id="deleteBtn">削除</button>
    <button id="backBtn">戻る</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// URLパラメータからid取得
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  alert("不正なアクセスです");
  window.location.href = "index.html";
}

let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  if(!user){
    alert("ログインしてください");
    window.location.href = "index.html";
  } else {
    currentUser = user;
    loadFigure();
  }
});

async function loadFigure(){
  const docRef = doc(db, "figures", id);
  const docSnap = await getDoc(docRef);

  if(!docSnap.exists()){
    alert("商品が存在しません");
    window.location.href = "index.html";
    return;
  }

  const data = docSnap.data();

  // 自分のフィギュアでない場合は戻す
  if(data.uid !== currentUser.uid){
    alert("権限がありません");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("name").value = data.name;
  document.getElementById("price").value = data.price;
  document.getElementById("imageUrl").value = data.imageUrl || "";

  // 現在の画像表示
  document.getElementById("currentImage").src = data.imageUrl || "https://via.placeholder.com/600x400?text=No+Image";
}

// 更新
document.getElementById("updateBtn").onclick = async () => {
  const name = document.getElementById("name").value.trim();
  const price = Number(document.getElementById("price").value);
  const imageUrl = document.getElementById("imageUrl").value.trim();

  if(!name || !price){
    alert("入力してください");
    return;
  }

  try{
    await updateDoc(doc(db, "figures", id), {
      name,
      price,
      imageUrl
    });
    alert("更新しました");
    // 画像も更新
    document.getElementById("currentImage").src = imageUrl || "https://via.placeholder.com/600x400?text=No+Image";
  } catch(e){
    alert("更新に失敗しました: " + e.message);
  }
}

// 削除
document.getElementById("deleteBtn").onclick = async () => {
  if(confirm("削除しますか？")){
    try{
      await deleteDoc(doc(db, "figures", id));
      alert("削除しました");
      window.location.href = "index.html";
    } catch(e){
      alert("削除に失敗しました: " + e.message);
    }
  }
}

// 戻る
document.getElementById("backBtn").onclick = () => {
  window.location.href = "index.html";
}
</script>

</body>
</html>
