<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Figure Manager Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;padding:15px;text-align:center;font-size:20px;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 3px 8px rgba(0,0,0,0.05);}
input,select,textarea,button{padding:6px;margin:4px 0;width:100%;}
button{background:#2563eb;color:white;border:none;border-radius:6px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;}
.figure-card{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.figure-card img{width:100%;border-radius:8px;}
.total{font-size:22px;font-weight:bold;}
.green{color:green;}
.red{color:red;}
nav{position:fixed;bottom:0;width:100%;background:white;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:10px 0;}
nav button{background:none;color:#2563eb;font-weight:bold;}
.hidden{display:none;}
</style>
</head>
<body>

<header>📦 Figure Manager Pro</header>

<div class="container">

<div class="card">
<h2>総資産</h2>
<div class="total" id="totalAsset">¥0</div>
<div id="profitLoss"></div>
</div>

<div class="card">
<h2>フィギュア登録</h2>
<input type="text" id="name" placeholder="商品名">
<input type="text" id="series" placeholder="作品名">
<input type="text" id="character" placeholder="キャラ名">
<input type="text" id="maker" placeholder="メーカー">
<input type="text" id="scale" placeholder="スケール (例 1/7)">
<input type="date" id="purchaseDate">
<input type="number" id="purchasePrice" placeholder="購入価格">
<input type="number" id="currentPrice" placeholder="現在価格">
<select id="status">
<option value="owned">所持</option>
<option value="reserved">予約</option>
<option value="sold">売却</option>
</select>
<input type="date" id="releaseDate" placeholder="発売予定日">
<textarea id="memo" placeholder="メモ"></textarea>
<input type="file" id="imageInput" accept="image/*">
<button onclick="addFigure()">登録</button>
</div>

<div class="card">
<h2>検索 / フィルター</h2>
<select id="filterStatus" onchange="render()">
<option value="all">全て</option>
<option value="owned">所持</option>
<option value="reserved">予約</option>
<option value="sold">売却</option>
</select>
</div>

<div class="card">
<h2>コレクション</h2>
<div class="grid" id="figureList"></div>
</div>

<div class="card">
<h2>作品別割合</h2>
<canvas id="seriesChart"></canvas>
</div>

</div>

<nav>
<button onclick="scrollToTop()">TOP</button>
</nav>

<script>
let figures=JSON.parse(localStorage.getItem("figures"))||[];

function save(){localStorage.setItem("figures",JSON.stringify(figures));}

function addFigure(){
let reader=new FileReader();
let file=imageInput.files[0];
reader.onload=function(){
figures.push({
id:Date.now(),
name:name.value,
series:series.value,
character:character.value,
maker:maker.value,
scale:scale.value,
purchaseDate:purchaseDate.value,
purchasePrice:parseFloat(purchasePrice.value)||0,
currentPrice:parseFloat(currentPrice.value)||0,
status:status.value,
releaseDate:releaseDate.value,
memo:memo.value,
image:reader.result
});
save();
render();
};
if(file){reader.readAsDataURL(file);}else{
figures.push({
id:Date.now(),
name:name.value,
series:series.value,
character:character.value,
maker:maker.value,
scale:scale.value,
purchaseDate:purchaseDate.value,
purchasePrice:parseFloat(purchasePrice.value)||0,
currentPrice:parseFloat(currentPrice.value)||0,
status:status.value,
releaseDate:releaseDate.value,
memo:memo.value,
image:""
});
save();
render();
}
}

function render(){
let filter=filterStatus.value;
figureList.innerHTML="";
let total=0;
let purchaseTotal=0;
let seriesData={};

figures.forEach(f=>{
if(filter!=="all"&&f.status!==filter)return;

if(f.status==="owned"){
total+=f.currentPrice;
purchaseTotal+=f.purchasePrice;
if(!seriesData[f.series])seriesData[f.series]=0;
seriesData[f.series]+=f.currentPrice;
}

figureList.innerHTML+=`
<div class="figure-card">
${f.image?`<img src="${f.image}">`:""}
<strong>${f.name}</strong><br>
${f.series}<br>
¥${f.currentPrice.toLocaleString()}<br>
<small>${f.status}</small>
</div>`;
});

totalAsset.innerText="¥"+total.toLocaleString();
let diff=total-purchaseTotal;
profitLoss.innerHTML=diff>=0?`<span class="green">含み益 +¥${diff.toLocaleString()}</span>`:`<span class="red">含み損 ¥${diff.toLocaleString()}</span>`;

renderChart(seriesData);
}

let chart;
function renderChart(data){
if(chart)chart.destroy();
chart=new Chart(document.getElementById("seriesChart"),{
type:"pie",
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
}
});
}

function scrollToTop(){window.scrollTo({top:0,behavior:"smooth"});}

render();
</script>

</body>
</html>
