<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7",
  measurementId: "G-FD6EFD30CW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("userInfo").innerHTML = `
      <img src="${user.photoURL}" class="avatar">
      <span>${user.displayName}</span>
      <button onclick="logout()">ログアウト</button>
    `;
    loadFigures();
  } else {
    currentUser = null;
    document.getElementById("userInfo").innerHTML = "";
  }
});

window.login = async function(){
  await signInWithPopup(auth, provider);
};

window.logout = async function(){
  await signOut(auth);
};

window.addFigure = async function(){
  if(!currentUser){
    alert("ログインしてください");
    return;
  }

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const imageUrl = document.getElementById("imageUrl").value;

  if(!name || !price){
    alert("入力してください");
    return;
  }

  await addDoc(collection(db, "figures"), {
    uid: currentUser.uid,
    name,
    price: Number(price),
    imageUrl: imageUrl || "",
    createdAt: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("imageUrl").value = "";

  loadFigures();
};

async function loadFigures(){
  if(!currentUser) return;

  const querySnapshot = await getDocs(collection(db, "figures"));
  const list = document.getElementById("figureList");
  list.innerHTML = "";
  let total = 0;

  querySnapshot.forEach((d) => {
    const data = d.data();
    if(data.uid !== currentUser.uid) return;

    total += data.price;

    list.innerHTML += `
      <div class="card">
        <img src="${data.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image'}" class="figure-img">
        <div class="card-body">
          <div class="title">${data.name}</div>
          <div class="price">¥${data.price.toLocaleString()}</div>
          <button onclick="deleteFigure('${d.id}')">削除</button>
        </div>
      </div>`;
  });

  document.getElementById("totalValue").innerText =
    "総資産: ¥" + total.toLocaleString();
}

window.deleteFigure = async function(id){
  await deleteDoc(doc(db, "figures", id));
  loadFigures();
};

</script>
