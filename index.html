<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フィギュア管理</title>
</head>
<body>

<h1>フィギュア管理</h1>

<!-- ログインエリア -->
<div id="loginArea">
  <button onclick="login()">Googleログイン</button>
</div>

<!-- アプリ本体 -->
<div id="appArea" style="display:none;">
  <input id="name" placeholder="商品名">
  <input id="price" type="number" placeholder="価格">
  <button onclick="addFigure()">追加</button>

  <h3 id="totalValue">総資産: ¥0</h3>
  <div id="figureList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.login = async function(){
  await signInWithPopup(auth, provider);
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("appArea").style.display = "block";
    document.getElementById("loginArea").style.display = "none";
    loadFigures();
  } else {
    document.getElementById("appArea").style.display = "none";
    document.getElementById("loginArea").style.display = "block";
  }
});

window.addFigure = async function(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if(!name || !price){
    alert("入力してください");
    return;
  }

  await addDoc(collection(db, "figures"), {
    uid: currentUser.uid,
    name,
    price: Number(price),
    createdAt: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";

  loadFigures();
}

async function loadFigures(){
  const q = query(
    collection(db, "figures"),
    where("uid", "==", currentUser.uid)
  );

  const querySnapshot = await getDocs(q);
  const list = document.getElementById("figureList");
  list.innerHTML = "";
  let total = 0;

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    total += data.price;

    list.innerHTML += `
      <div>
        ${data.name} - ¥${data.price.toLocaleString()}
      </div>
    `;
  });

  document.getElementById("totalValue").innerText =
    "総資産: ¥" + total.toLocaleString();
}

</script>

</body>
</html>
