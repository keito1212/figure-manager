<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フィギュア管理</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.userBox{
  display:flex;
  align-items:center;
  gap:10px;
}

.userBox img{
  width:36px;
  height:36px;
  border-radius:50%;
}

.container{
  padding:30px;
}

input{
  margin-right:8px;
  padding:6px 10px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  padding:6px 12px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

/* 商品リストをグリッド表示 */
#figureList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card img{
  width:100%;
  aspect-ratio:1/1; /* 正方形っぽく */
  object-fit:cover;
  border-radius:8px;
  margin-bottom:10px;
}

.deleteBtn{
  background:#e74c3c;
  color:white;
  margin-top:8px;
}

.deleteBtn:hover{
  background:#c0392b;
}

</style>
</head>

<body>

<header>
  <h2>フィギュア管理</h2>
  <div id="userArea"></div>
</header>

<div class="container">

  <div id="loginArea">
    <button onclick="login()">Googleログイン</button>
  </div>

  <div id="appArea" style="display:none;">
    <input id="name" placeholder="商品名">
    <input id="price" type="number" placeholder="価格">
    <input id="imageUrl" placeholder="画像URL（任意）">
    <button onclick="addFigure()">追加</button>

    <h3 id="totalValue">総資産: ¥0</h3>
    <div id="figureList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where, doc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

// --- ログイン/ログアウト ---
window.login = async function(){
  await signInWithPopup(auth, provider);
}

window.logout = async function(){
  await signOut(auth);
}

// --- 認証状態変更 ---
onAuthStateChanged(auth, (user) => {
  const userArea = document.getElementById("userArea");

  if (user) {
    currentUser = user;

    userArea.innerHTML = `
      <div class="userBox">
        <img src="${user.photoURL}">
        <span>${user.displayName}</span>
        <button onclick="logout()">ログアウト</button>
      </div>
    `;

    document.getElementById("appArea").style.display = "block";
    document.getElementById("loginArea").style.display = "none";
    loadFigures();

  } else {
    currentUser = null;
    userArea.innerHTML = "";
    document.getElementById("appArea").style.display = "none";
    document.getElementById("loginArea").style.display = "block";
  }
});

// --- フィギュア追加 ---
window.addFigure = async function(){

  let name = document.getElementById("name").value.trim();
  let price = document.getElementById("price").value.trim();
  let imageUrl = document.getElementById("imageUrl").value.trim();

  if(!name || !price){
    alert("入力してください");
    return;
  }

  // Gyazo URL 自動変換
  if(imageUrl.match(/^https:\/\/gyazo\.com\/([a-f0-9]{32})$/)) {
    const match = imageUrl.match(/^https:\/\/gyazo\.com\/([a-f0-9]{32})$/);
    imageUrl = `https://i.gyazo.com/${match[1]}.png`;
  }

  await addDoc(collection(db, "figures"), {
    uid: currentUser.uid,
    name,
    price: Number(price),
    imageUrl: imageUrl || "",
    createdAt: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("imageUrl").value = "";

  loadFigures();
}

// --- フィギュア一覧読み込み ---
async function loadFigures(){
  const q = query(collection(db, "figures"), where("uid", "==", currentUser.uid));
  const querySnapshot = await getDocs(q);
  const list = document.getElementById("figureList");
  list.innerHTML = "";
  let total = 0;

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const docId = docSnap.id;
    total += data.price;

    const imageSrc = data.imageUrl && data.imageUrl !== ""
      ? data.imageUrl
      : "https://via.placeholder.com/600x400?text=No+Image";

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = imageSrc;

    const title = document.createElement("div");
    title.innerHTML = `<strong>${data.name}</strong>`;

    const price = document.createElement("div");
    price.textContent = `¥${data.price.toLocaleString()}`;

    const delBtn = document.createElement("button");
    delBtn.className = "deleteBtn";
    delBtn.textContent = "削除";
    // 🔹 dataset に docId を保持して確実に削除
    delBtn.dataset.docId = docId;
    delBtn.addEventListener("click", async (e) => {
      try {
        if(!confirm("本当に削除しますか？")) return;
        const id = e.currentTarget.dataset.docId;
        await deleteDoc(doc(db, "figures", id));
        loadFigures();
      } catch (error) {
        console.error("削除エラー:", error);
        alert("削除できませんでした");
      }
    });

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(price);
    card.appendChild(delBtn);

    list.appendChild(card);
  });

  document.getElementById("totalValue").innerText =
    "総資産: ¥" + total.toLocaleString();
}

</script>

</body>
</html>
