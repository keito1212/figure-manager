<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7",
  measurementId: "G-FD6EFD30CW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = async function(){
  await signInWithPopup(auth, provider);
  alert("ログイン成功");
  loadFigures();
}

window.addFigure = async function(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if(!name || !price){
    alert("入力してください");
    return;
  }

  await addDoc(collection(db, "figures"), {
    name,
    price: Number(price),
    createdAt: new Date()
  });

  loadFigures();
}

async function loadFigures(){
  const querySnapshot = await getDocs(collection(db, "figures"));
  const list = document.getElementById("figureList");
  list.innerHTML = "";
  let total = 0;

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    total += data.price;

    list.innerHTML += `
      <div class="card">
        <div class="card-body">
          <div>${data.name}</div>
          <div class="price">¥${data.price.toLocaleString()}</div>
        </div>
      </div>`;
  });

  document.getElementById("totalValue").innerText =
    "総資産: ¥" + total.toLocaleString();
}

loadFigures();

</script>
