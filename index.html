async function getUsdToJpyRate(){
  if(usdToJpyRate) return usdToJpyRate;
  try{
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    if(!res.ok) throw new Error("rate fetch failed");
    const data = await res.json();
    if(data?.rates?.JPY){
      usdToJpyRate = data.rates.JPY;
      return usdToJpyRate;
    }
  }catch(_e){ }

  usdToJpyRate = 150;
  return usdToJpyRate;
}

async function getMarketPrice(name){
  if(marketCache.has(name)) return marketCache.get(name);
  try{
    const rate = await getUsdToJpyRate();
    const res = await fetch(`https://dummyjson.com/products/search?q=${encodeURIComponent(name)}`);
    if(!res.ok) throw new Error("market search failed");
    const data = await res.json();
    if(!Array.isArray(data.products) || data.products.length===0){
      marketCache.set(name, null);
      return null;
    }

    const prices = data.products
      .map(p=>Number(p.price))
      .filter(p=>Number.isFinite(p) && p>0)
      .slice(0,5);
    if(prices.length===0){
      marketCache.set(name, null);
      return null;
    }

    const avgUsd = prices.reduce((sum,p)=>sum+p,0) / prices.length;
    const price = Math.round(avgUsd * rate);
    const marketData = { price };
    marketCache.set(name, marketData);
    return marketData;
  }catch(_e){
    marketCache.set(name, null);
    return null;
  }
}
