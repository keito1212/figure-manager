<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フィギュア管理</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.userBox{
  display:flex;
  align-items:center;
  gap:10px;
}

.userBox img{
  width:36px;
  height:36px;
  border-radius:50%;
}

.container{
  padding:30px;
}

.card{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  max-height:250px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:10px;
}

button{
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>フィギュア管理</h2>
  <div id="userArea"></div>
</header>

<div class="container">

  <div id="loginArea">
    <button onclick="login()">Googleログイン</button>
  </div>

  <div id="appArea" style="display:none;">
    <input id="name" placeholder="商品名">
    <input id="price" type="number" placeholder="価格">
    <input id="imageUrl" placeholder="画像URL（任意）">
    <button onclick="addFigure()">追加</button>

    <h3 id="totalValue">総資産: ¥0</h3>
    <div id="figureList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.login = async function(){
  await signInWithPopup(auth, provider);
}

window.logout = async function(){
  await signOut(auth);
}

onAuthStateChanged(auth, (user) => {
  const userArea = document.getElementById("userArea");

  if (user) {
    currentUser = user;

    userArea.innerHTML = `
      <div class="userBox">
        <img src="${user.photoURL}">
        <span>${user.displayName}</span>
        <button onclick="logout()">ログアウト</button>
      </div>
    `;

    document.getElementById("appArea").style.display = "block";
    document.getElementById("loginArea").style.display = "none";
    loadFigures();

  } else {
    userArea.innerHTML = "";
    document.getElementById("appArea").style.display = "none";
    document.getElementById("loginArea").style.display = "block";
  }
});

window.addFigure = async function(){

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const imageUrl = document.getElementById("imageUrl").value.trim();

  if(!name || !price){
    alert("入力してください");
    return;
  }

  await addDoc(collection(db, "figures"), {
    uid: currentUser.uid,
    name,
    price: Number(price),
    imageUrl: imageUrl || "",
    createdAt: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("imageUrl").value = "";

  loadFigures();
}

async function loadFigures(){

  const q = query(
    collection(db, "figures"),
    where("uid", "==", currentUser.uid)
  );

  const querySnapshot = await getDocs(q);
  const list = document.getElementById("figureList");
  list.innerHTML = "";
  let total = 0;

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    total += data.price;

    const imageSrc = data.imageUrl && data.imageUrl !== ""
      ? data.imageUrl
      : "https://via.placeholder.com/600x400?text=No+Image";

    list.innerHTML += `
      <div class="card">
        <img src="${imageSrc}">
        <div><strong>${data.name}</strong></div>
        <div>¥${data.price.toLocaleString()}</div>
      </div>
    `;
  });

  document.getElementById("totalValue").innerText =
    "総資産: ¥" + total.toLocaleString();
}

</script>

</body>
</html>
