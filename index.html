<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フィギュア管理</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.userBox{
  display:flex;
  align-items:center;
  gap:10px;
}
.userBox img{
  width:36px;
  height:36px;
  border-radius:50%;
}
.container{
  padding:30px;
}
input, select{
  margin-right:8px;
  padding:6px 10px;
  border-radius:5px;
  border:1px solid #ccc;
}
button{
  padding:6px 12px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}
#figureList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}
.card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:10px;
}
.filterGroup{
  margin:15px 0;
  display:flex;
  gap:10px;
  align-items:center;
}
</style>
</head>
<body>

<header>
  <h2>フィギュア管理</h2>
  <div id="userArea"></div>
</header>

<div class="container">
  <div id="loginArea">
    <button onclick="login()">Googleログイン</button>
  </div>

  <div id="appArea" style="display:none;">
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <input id="name" placeholder="商品名">
      <input id="price" type="number" placeholder="価格" step="100">
      <select id="brandSelect"></select>
      <select id="placeSelect"></select>
      <button onclick="addFigure()" style="background:#e74c3c;color:white;">追加</button>
    </div>

    <div style="margin:15px 0;">
      <h3 id="totalValue">総資産: ¥0</h3>
      <div class="filterGroup">
        <label>並べ替え:</label>
        <select id="sortSelect">
          <option value="nameAsc">名前順（昇順）</option>
          <option value="priceDesc">価格順（高→低）</option>
          <option value="priceAsc">価格順（低→高）</option>
          <option value="newest">登録順（新→古）</option>
          <option value="oldest">登録順（古→新）</option>
        </select>
        <label>
          所持<input type="checkbox" id="ownedCheck" checked>
        </label>
        <label>
          未所持<input type="checkbox" id="unownedCheck" checked>
        </label>
        <label>
          売却済み<input type="checkbox" id="soldCheck" checked>
        </label>
      </div>
    </div>

    <div id="figureList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDGPENSTpnJNDobkMCt5DPWsIFYDCeoQ",
  authDomain: "figure-manager-ee77e.firebaseapp.com",
  projectId: "figure-manager-ee77e",
  storageBucket: "figure-manager-ee77e.firebasestorage.app",
  messagingSenderId: "869184722518",
  appId: "1:869184722518:web:3c3c5cc645734707ec8df7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

const initialBrands=[
"未選択","グッドスマイルカンパニー","アルター","コトブキヤ","マックスファクトリー","バンダイ","メガハウス","ホビージャパン","タカラトミー","フリーイング","アニプレックス","ホビーラウンジ","ファット・カンパニー","セガプライズ","リボルブ","オーキッドシード","アイリス・オーヤマ（ミニチュア系）","カプコン（ゲーム系フィギュア）","バンプレスト（プライズ景品）","コナミ（限定フィギュア）","アゾンインターナショナル（ドール系）"
];

const initialPlaces=[
"未選択","Amazon","楽天市場","Yahoo!ショッピング","ヤフオク","ヤフーフリマ","メルカリ","あみあみ","フィギュア専門店（アニメイトなど）","ホビーショップ","トイザらス","ソフマップ","イベント・ワンフェス","海外通販（AliExpress、HobbyLink Japan など）","リサイクルショップ"
];

// ログイン/ログアウト
window.login = async function(){ await signInWithPopup(auth, provider); }
window.logout = async function(){ await signOut(auth); }

onAuthStateChanged(auth, (user) => {
  const userArea = document.getElementById("userArea");
  if(user){
    currentUser=user;
    userArea.innerHTML=`
      <div class="userBox">
        <img src="${user.photoURL}">
        <span>${user.displayName}</span>
        <button onclick="logout()">ログアウト</button>
      </div>
    `;
    document.getElementById("appArea").style.display="block";
    document.getElementById("loginArea").style.display="none";
    initSelects();
    loadFigures();
  }else{
    currentUser=null;
    userArea.innerHTML="";
    document.getElementById("appArea").style.display="none";
    document.getElementById("loginArea").style.display="block";
  }
});

// ドロップダウン初期化
function initSelects(){
  const brandSelect=document.getElementById("brandSelect");
  brandSelect.innerHTML="";
  initialBrands.forEach(b=>{
    const opt=document.createElement("option");
    opt.value=b; opt.textContent=b;
    brandSelect.appendChild(opt);
  });
  const placeSelect=document.getElementById("placeSelect");
  placeSelect.innerHTML="";
  initialPlaces.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p; opt.textContent=p;
    placeSelect.appendChild(opt);
  });
}

// 商品追加
window.addFigure = async function(){
  const name=document.getElementById("name").value.trim();
  const price=document.getElementById("price").value.trim();
  const brand=document.getElementById("brandSelect").value;
  const purchasePlace=document.getElementById("placeSelect").value;
  if(!name||!price){ alert("商品名と価格を入力してください"); return; }

  let imageUrl=document.getElementById("imageUrl").value.trim();
  const gyazoMatch=imageUrl.match(/^https:\/\/gyazo\.com\/([a-f0-9]{32})$/);
  if(gyazoMatch){ imageUrl=`https://i.gyazo.com/${gyazoMatch[1]}.png`; }

  await addDoc(collection(db,"figures"),{
    uid:currentUser.uid,
    name,
    price:Number(price),
    imageUrl:imageUrl||"",
    brand:brand,
    purchasePlace:purchasePlace,
    status:"owned",
    createdAt:new Date()
  });

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("imageUrl").value="";
  document.getElementById("brandSelect").value="未選択";
  document.getElementById("placeSelect").value="未選択";
  loadFigures();
}

// 並べ替え/フィルター変更時に自動更新
document.getElementById("sortSelect").onchange=loadFigures;
document.getElementById("ownedCheck").onchange=loadFigures;
document.getElementById("unownedCheck").onchange=loadFigures;
document.getElementById("soldCheck").onchange=loadFigures;

// フィギュア一覧読み込み
async function loadFigures(){
  const q = query(collection(db,"figures"));
  const snapshot = await getDocs(q);
  const list=document.getElementById("figureList");
  list.innerHTML="";
  let total=0;

  const figures=snapshot.docs.map(docSnap=>{
    const data=docSnap.data();
    data.id=docSnap.id;
    return data;
  }).filter(f=>{
    if(f.uid!==currentUser.uid) return false;
    const ownedCheck=document.getElementById("ownedCheck").checked;
    const unownedCheck=document.getElementById("unownedCheck").checked;
    const soldCheck=document.getElementById("soldCheck").checked;
    if(f.status==="owned" && !ownedCheck) return false;
    if(f.status==="unowned" && !unownedCheck) return false;
    if(f.status==="sold" && !soldCheck) return false;
    return true;
  });

  // 並べ替え
  const sortVal=document.getElementById("sortSelect").value;
  figures.sort((a,b)=>{
    if(sortVal==="nameAsc") return a.name.localeCompare(b.name);
    if(sortVal==="priceDesc") return b.price-a.price;
    if(sortVal==="priceAsc") return a.price-b.price;
    if(sortVal==="newest") return b.createdAt.toDate()-a.createdAt.toDate();
    if(sortVal==="oldest") return a.createdAt.toDate()-b.createdAt.toDate();
    return 0;
  });

  figures.forEach(f=>{
    total+=f.price;
    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>{ window.open(`figureDetail.html?id=${f.id}`,"_blank","width=600,height=700"); }

    const img=document.createElement("img");
    img.src=f.imageUrl||"https://via.placeholder.com/600x400?text=No+Image";

    const title=document.createElement("div");
    title.innerHTML=`<strong>${f.name}</strong>`;

    const price=document.createElement("div");
    price.textContent=`¥${f.price.toLocaleString()}`;

    const status=document.createElement("div");
    status.textContent=f.status==="owned"?"所持":f.status==="unowned"?"未所持":"売却済み";

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(price);
    card.appendChild(status);

    list.appendChild(card);
  });

  document.getElementById("totalValue").innerText="総資産: ¥"+total.toLocaleString();
}
</script>

</body>
</html>
